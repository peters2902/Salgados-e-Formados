<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido via WhatsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid #dee2e6;
        }
        h1 {
            text-align: center;
            color: #343a40;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: 700;
            color: #495057;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #80bdff;
            outline: none;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            width: 100%;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6c757d;
        }
    </style>
    <script>
        function enviarPedido(event) {
            event.preventDefault(); // Impede o envio padrão do formulário

            // Obtém os valores dos campos
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const quantidade = document.getElementById('quantidade').value;
            const turma = document.getElementById('turma').value;

            // Obtém os produtos selecionados
            const produtosSelecionados = [];
            const checkboxes = document.querySelectorAll('input[name="produto"]:checked');
            checkboxes.forEach((checkbox) => {
                produtosSelecionados.push(checkbox.value);
            });

            // Monta a mensagem para o WhatsApp
            const textoMensagem = `*Novo Pedido*\nNome: ${nome}\nTelefone: ${telefone}\nProdutos: ${produtosSelecionados.join(', ')}\nQuantidade: ${quantidade}\nTurma: ${turma}`;

            // Codifica a mensagem para URL
            const mensagemCodificada = encodeURIComponent(textoMensagem);

            // Cria a URL do WhatsApp
            const urlWhatsApp = `https://wa.me/5541999331533?text=${mensagemCodificada}`;

            // Redireciona para o WhatsApp
            window.open(urlWhatsApp, '_blank');
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Faça seu Pedido pelo WhatsApp</h1>
        <form onsubmit="enviarPedido(event)">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" name="telefone" required placeholder="Ex: 41999331533">

            <label>Escolha seus Produtos:</label>
            <div>
                <label><input type="checkbox" name="produto" value="Hamburgão - R$ 7,00"> Hamburgão - R$ 7,00</label>
                <label><input type="checkbox" name="produto" value="Suco - R$ 4,00"> Suco - R$ 4,00</label>
                <label><input type="checkbox" name="produto" value="Kit Hamburgão + Suco - R$ 10,00"> Kit Hamburgão + Suco - R$ 10,00</label>
            </div>

            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" name="quantidade" min="1" required>

            <label for="turma">Turma:</label>
            <input type="text" id="turma" name="turma" required placeholder="Ex: Turma A">

            <input type="submit" value="Enviar Pedido">
        </form>

        <div class="footer">© 2026 Todos os direitos reservados.</div>
    </div>
</body>
</html>
